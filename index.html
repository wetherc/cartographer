<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campaign Builder</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237b4a2f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2l8.5 5v10L12 22l-8.5-5V7z'/%3E%3Cpath d='M12 8L6 17h12z'/%3E%3Cpath d='M12 2v6'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Campaign Builder</h1>
    <div id="mode-switch-container"></div>
    <div class="app-header__actions">
      <button id="new-btn" class="btn" type="button">New</button>
      <button id="example-btn" class="btn" type="button">Load example</button>
      <button id="save-btn" class="btn btn--primary" type="button">Save</button>
      <button id="undo-btn" class="btn" type="button">Undo</button>
      <button id="export-btn" class="btn" type="button">Export</button>
      <button id="import-btn" class="btn" type="button">Import</button>
      <input id="import-input" type="file" accept="application/json" hidden />
    </div>
  </header>

  <main class="app-main">
    <aside id="world-tree-container" class="app-buildrail card" aria-label="World tree">
      <h2 class="card__title">World</h2>
    </aside>

    <section class="app-map">
      <div id="breadcrumb-container"></div>
      <div id="map-viewport" class="map-viewport">
        <canvas id="map-canvas" width="720" height="540"></canvas>
      </div>
    </section>

    <aside class="app-sidebar">
      <section id="region-tree-container" class="card" aria-label="Discovered regions">
        <h2 class="card__title">World</h2>
      </section>
      <section id="time-container" class="card" aria-label="In-game time">
        <h2 class="card__title">Time</h2>
      </section>
      <section id="party-container" class="card" aria-label="Party roster">
        <h2 class="card__title">Party</h2>
      </section>
      <section id="character-sheet-container" class="card" aria-label="Character sheet"></section>
      <section id="inventory-container" class="card" aria-label="Inventory">
        <h2 class="card__title">Inventory</h2>
      </section>
      <section id="encounter-container" class="card" aria-label="Encounters">
        <h2 class="card__title">Encounters</h2>
      </section>
      <section id="initiative-container" class="card" aria-label="Initiative">
        <h2 class="card__title">Initiative</h2>
      </section>
      <section id="npc-container" class="card" aria-label="NPCs">
        <h2 class="card__title">NPCs</h2>
      </section>
      <section id="dice-tray-container" class="card" aria-label="Dice tray">
        <h2 class="card__title">Dice Tray</h2>
      </section>
      <section id="quest-container" class="card" aria-label="Quest log">
        <h2 class="card__title">Quests</h2>
      </section>
      <section id="handout-container" class="card" aria-label="Handouts">
        <h2 class="card__title">Handouts</h2>
      </section>
      <section id="travelog-container" class="card" aria-label="Travelogue">
        <h2 class="card__title">Travelogue</h2>
      </section>
    </aside>

    <aside id="build-tools" class="app-buildrail app-buildrail--stack" aria-label="Build tools">
      <section id="palette-container" class="card" aria-label="Tile palette">
        <h2 class="card__title">Palette</h2>
      </section>
      <section id="inspector-container" class="card" aria-label="Tile inspector">
        <h2 class="card__title">Tile</h2>
      </section>
    </aside>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
