<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campaign Builder</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237b4a2f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2l8.5 5v10L12 22l-8.5-5V7z'/%3E%3Cpath d='M12 8L6 17h12z'/%3E%3Cpath d='M12 2v6'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Campaign Builder</h1>
    <div id="mode-switch-container"></div>
    <div class="app-header__actions">
      <button id="new-btn" class="btn" type="button">New</button>
      <button id="example-btn" class="btn" type="button">Load example</button>
      <button id="save-btn" class="btn btn--primary" type="button">Save</button>
      <button id="undo-btn" class="btn" type="button">Undo</button>
      <button id="export-btn" class="btn" type="button">Export</button>
      <button id="import-btn" class="btn" type="button">Import</button>
      <input id="import-input" type="file" accept="application/json" hidden />
    </div>
    <div id="role-switch-container"></div>
  </header>

  <main class="app-main">
    <aside id="world-tree-container" class="app-buildrail card" aria-label="World tree">
      <h2 class="card__title">World</h2>
    </aside>

    <div class="app-center">
      <section class="app-map">
        <div id="breadcrumb-container"></div>
        <div id="map-viewport" class="map-viewport">
          <canvas id="map-canvas" width="720" height="540"></canvas>
        </div>
      </section>

      <!-- The party's character boxes and the dice tray sit below the map so
           they don't compete with the map for the sidebar's narrow width. -->
      <div id="below-map" class="app-belowmap">
        <section id="party-container" class="card" aria-label="Party roster">
          <h2 class="card__title">Party</h2>
        </section>
        <section id="character-sheet-container" class="card" aria-label="Character sheet"></section>
        <section id="inventory-container" class="card" aria-label="Inventory">
          <h2 class="card__title">Inventory</h2>
        </section>
        <section id="dice-tray-container" class="card" aria-label="Dice tray">
          <h2 class="card__title">Dice Tray</h2>
        </section>
      </div>
    </div>

    <aside class="app-sidebar">
      <button id="sidebar-toggle" class="sidebar-toggle btn" type="button" aria-expanded="true" aria-controls="sidebar-panels">Hide panels</button>
      <div id="sidebar-panels" class="sidebar-panels">
        <div id="sidebar-tabs" class="tabs" role="tablist" aria-label="Session panels">
          <button class="tabs__tab" type="button" role="tab" id="tab-session" aria-controls="panel-session" aria-selected="true">Session</button>
          <button class="tabs__tab" type="button" role="tab" id="tab-story" aria-controls="panel-story" aria-selected="false" tabindex="-1">Story</button>
          <button class="tabs__tab" type="button" role="tab" id="tab-log" aria-controls="panel-log" aria-selected="false" tabindex="-1">Log</button>
        </div>

        <div class="tabs__panel" role="tabpanel" id="panel-session" aria-labelledby="tab-session">
          <section id="region-tree-container" class="card" aria-label="Discovered regions">
            <h2 class="card__title">World</h2>
          </section>
          <section id="time-container" class="card" aria-label="In-game time">
            <h2 class="card__title">Time</h2>
          </section>
          <section id="encounter-container" class="card" aria-label="Encounters">
            <h2 class="card__title">Encounters</h2>
          </section>
          <section id="initiative-container" class="card" aria-label="Initiative">
            <h2 class="card__title">Initiative</h2>
          </section>
        </div>

        <div class="tabs__panel" role="tabpanel" id="panel-story" aria-labelledby="tab-story" hidden>
          <section id="quest-container" class="card" aria-label="Quest log">
            <h2 class="card__title">Quests</h2>
          </section>
          <section id="npc-container" class="card" aria-label="NPCs">
            <h2 class="card__title">NPCs</h2>
          </section>
          <section id="handout-container" class="card" aria-label="Handouts">
            <h2 class="card__title">Handouts</h2>
          </section>
        </div>

        <div class="tabs__panel" role="tabpanel" id="panel-log" aria-labelledby="tab-log" hidden>
          <section id="travelog-container" class="card" aria-label="Travelogue">
            <h2 class="card__title">Travelogue</h2>
          </section>
        </div>
      </div>
    </aside>

    <aside id="build-tools" class="app-buildrail app-buildrail--stack" aria-label="Build tools">
      <div id="build-tabs" class="tabs" role="tablist" aria-label="Build panels">
        <button class="tabs__tab" type="button" role="tab" id="build-tab-paint" aria-controls="build-panel-paint" aria-selected="true">Paint</button>
        <button class="tabs__tab" type="button" role="tab" id="build-tab-tile" aria-controls="build-panel-tile" aria-selected="false" tabindex="-1">Tile</button>
        <button class="tabs__tab" type="button" role="tab" id="build-tab-encounters" aria-controls="build-panel-encounters" aria-selected="false" tabindex="-1">Encounters</button>
      </div>

      <div class="tabs__panel" role="tabpanel" id="build-panel-paint" aria-labelledby="build-tab-paint">
        <section id="generate-container" class="card" aria-label="Generate map">
          <h2 class="card__title">Generate</h2>
          <p class="generate__hint">Fill this node with an auto-generated layout.</p>
          <button id="generate-btn" class="btn" type="button">Generate map...</button>
        </section>
        <section id="map-tools-container" class="card" aria-label="Map tools">
          <h2 class="card__title">Tools</h2>
          <div class="map-tools">
            <button id="stroke-undo-btn" class="btn" type="button">Undo stroke</button>
            <button id="export-png-btn" class="btn" type="button">Export PNG</button>
          </div>
        </section>
        <section id="palette-container" class="card" aria-label="Tile palette">
          <h2 class="card__title">Palette</h2>
        </section>
      </div>

      <div class="tabs__panel" role="tabpanel" id="build-panel-tile" aria-labelledby="build-tab-tile" hidden>
        <section id="inspector-container" class="card" aria-label="Tile inspector">
          <h2 class="card__title">Tile</h2>
        </section>
      </div>

      <div class="tabs__panel" role="tabpanel" id="build-panel-encounters" aria-labelledby="build-tab-encounters" hidden>
        <section id="build-encounters-container" class="card" aria-label="Encounter authoring">
          <h2 class="card__title">Encounters</h2>
        </section>
      </div>
    </aside>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
