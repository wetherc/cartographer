    <circle cx="24" cy="15" r="2" opacity="0.55"/>
    <circle cx="21.5" cy="11.5" r="2.6" opacity="0.4"/>
    <circle cx="18.5" cy="8.5" r="3" opacity="0.25"/>
  </g>
  <!-- open-fronted forge shed -->
  <rect x="16" y="30" width="26" height="17" fill="#8a6f4a" stroke="#5f4c33" stroke-width="0.8"/>
  <rect x="18" y="32" width="22" height="15" fill="#3a3128"/>
  <polygon points="13,31 29,20 45,31" fill="#7a5a3a"/>
  <polygon points="29,20 45,31 29,31" fill="#5f4630"/>
  <path d="M17 28.2 L41 28.2 M21 25.5 L37 25.5" stroke="#6b4e33" stroke-width="0.8" fill="none"/>
  <rect x="22" y="17" width="4" height="8" fill="#8a8f94" stroke="#6f747a" stroke-width="0.5"/>
  <!-- forge glow inside -->
  <circle cx="29" cy="41" r="8" fill="#e86a2c" opacity="0.18"/>
  <circle cx="29" cy="41" r="4.5" fill="#e86a2c" opacity="0.4"/>
  <path d="M27 44 q-1.5 -3 0.6 -5 q0.2 1.6 1.4 2.2 q-0.3 -2.6 1.8 -4.2 q0 2 1.3 3.2 q1 1.2 0.6 2.8 q-0.6 2 -2.9 2.2 q-2 0 -2.8 -1.2 Z" fill="#f5a23c"/>
  <path d="M28.4 43.6 q-0.7 -1.6 0.5 -2.8 q0.4 1 1.2 1.4 q0.5 1.4 -0.2 2.1 q-1 0.6 -1.5 -0.7 Z" fill="#fbd77a"/>
