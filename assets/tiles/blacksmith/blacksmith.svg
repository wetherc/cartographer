  <g>
    <rect x="45" y="42" width="6.5" height="4.5" fill="#6b5236"/>
    <path d="M44 39 h6 q3 0 4 -1.6 l0 3 q-1.2 1 -3 1.2 l-4.6 0 q-1.5 1.6 -1.4 3.4 l-2.4 0 q-0.2 -2.2 1.4 -3.6 Z" fill="#4a4d52"/>
