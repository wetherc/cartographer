<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#5a9b4a"/>
  <ellipse cx="14" cy="10" rx="9" ry="5" fill="#63a651"/>
  <ellipse cx="52" cy="56" rx="8" ry="4" fill="#529044"/>
  <ellipse cx="32" cy="42" rx="23" ry="12" fill="#557f43"/>
  <!-- Raised temple platform: top slab, shadowed front face, cracked steps
       descending at the center. Everything above stands on this. -->
  <g>
    <path d="M12 38 L52 38 L52 42 L12 42 Z" fill="#b5b09e"/>
    <path d="M12 42 L52 42 L52 46 L12 46 Z" fill="#8e8975"/>
    <path d="M12 38 L52 38 L52 39 L12 39 Z" fill="#c9c4b2"/>
    <path d="M20 38 L20 42 M30 38 L30 41.8 M41 38 L41 42 M47 38.2 L47 42" stroke="#9b9682" stroke-width="0.5" fill="none"/>
    <path d="M26 46 L38 46 L38 49 L26 49 Z" fill="#a6a18d"/>
    <path d="M26 46 L38 46 L38 46.8 L26 46.8 Z" fill="#bab5a2"/>
    <path d="M28 49 L36 49 L36 52 L28 52 Z" fill="#8e8975"/>
    <path d="M28 49 L36 49 L36 49.8 L28 49.8 Z" fill="#a6a18d"/>
    <path d="M33 46.4 L33.5 48.8" stroke="#7d7864" stroke-width="0.5" fill="none"/>
  </g>
  <!-- Colonnade on the platform: two full columns still carrying a broken
       architrave, one column snapped at half height, one bare stump. -->
  <g>
    <ellipse cx="19" cy="38.5" rx="3" ry="1.1" fill="#7d8368"/>
    <rect x="17.2" y="20" width="3.6" height="18" fill="#c9c4b2"/>
    <rect x="17.2" y="20" width="1.4" height="18" fill="#dcd7c6"/>
    <path d="M18.9 20 L18.9 38" stroke="#b5b09e" stroke-width="0.45"/>
    <rect x="16.4" y="18.6" width="5.2" height="1.6" fill="#b5b09e"/>
    <rect x="16.8" y="17.2" width="4.4" height="1.4" fill="#c9c4b2"/>
    <path d="M17.6 26 L19.4 27.6 L18.4 29.4" stroke="#a6a18d" stroke-width="0.55" fill="none"/>
  </g>
  <g>
    <ellipse cx="29" cy="38.5" rx="3" ry="1.1" fill="#7d8368"/>
    <rect x="27.2" y="20" width="3.6" height="18" fill="#c9c4b2"/>
    <rect x="27.2" y="20" width="1.4" height="18" fill="#dcd7c6"/>
    <path d="M28.9 20 L28.9 38" stroke="#b5b09e" stroke-width="0.45"/>
    <rect x="26.4" y="18.6" width="5.2" height="1.6" fill="#b5b09e"/>
    <rect x="26.8" y="17.2" width="4.4" height="1.4" fill="#c9c4b2"/>
  </g>
  <!-- Architrave slab resting on the two full columns, snapped at its
       right end. -->
  <path d="M15.5 14.4 L33.8 14 L34.6 15.4 L33.4 17.2 L15.5 17.2 Z" fill="#a6a18d"/>
  <path d="M15.5 14.4 L33.8 14 L33.9 15 L15.5 15.4 Z" fill="#bab5a2"/>
  <path d="M33.4 17.2 L34.6 15.4 L33.8 14" stroke="#8e8975" stroke-width="0.5" fill="none"/>
  <!-- Snapped column: lower half standing, break line jagged. -->
  <g>
    <ellipse cx="39.5" cy="38.5" rx="3" ry="1.1" fill="#7d8368"/>
    <rect x="37.7" y="28" width="3.6" height="10" fill="#c9c4b2"/>
    <rect x="37.7" y="28" width="1.4" height="10" fill="#dcd7c6"/>
    <path d="M37.7 28 L38.6 26.8 L39.5 28.2 L40.4 27 L41.3 28 L41.3 29 L37.7 29 Z" fill="#dcd7c6"/>
  </g>
  <!-- Bare stump at the row's end. -->
  <g>
    <ellipse cx="47.5" cy="38.5" rx="2.8" ry="1" fill="#7d8368"/>
    <rect x="45.9" y="33.5" width="3.2" height="4.8" fill="#c9c4b2"/>
    <rect x="45.9" y="33.5" width="1.2" height="4.8" fill="#dcd7c6"/>
    <path d="M45.9 33.5 L46.8 32.6 L47.8 33.7 L48.6 32.9 L49.1 33.8 L49.1 34.5 L45.9 34.5 Z" fill="#dcd7c6"/>
  </g>
  <!-- The fallen column: three drums lying in front of the platform where
       they rolled, each grounded with its own shadow. -->
  <g>
    <ellipse cx="21" cy="52.5" rx="5" ry="1.6" fill="#42522f" opacity="0.5"/>
    <rect x="16.5" y="48.2" width="9" height="3.6" rx="1.8" fill="#b5b09e"/>
    <path d="M17.5 49.2 L24.5 49.2" stroke="#c9c4b2" stroke-width="0.8"/>
    <ellipse cx="25.5" cy="50" rx="1.4" ry="1.8" fill="#c9c4b2"/>
    <circle cx="25.5" cy="50" r="0.55" fill="#a6a18d"/>
    <ellipse cx="34" cy="53.5" rx="4" ry="1.4" fill="#42522f" opacity="0.5"/>
    <rect x="30.5" y="49.8" width="7" height="3.3" rx="1.65" fill="#b5b09e"/>
    <path d="M31.5 50.8 L36.5 50.8" stroke="#c9c4b2" stroke-width="0.7"/>
    <ellipse cx="37.5" cy="51.4" rx="1.2" ry="1.6" fill="#c9c4b2"/>
    <circle cx="37.5" cy="51.4" r="0.5" fill="#a6a18d"/>
    <ellipse cx="44" cy="53" rx="2.6" ry="1" fill="#42522f" opacity="0.5"/>
    <ellipse cx="44" cy="51" rx="2.2" ry="2" fill="#b5b09e"/>
    <ellipse cx="44" cy="51" rx="1.1" ry="1" fill="#c9c4b2"/>
  </g>
  <!-- Rubble spilling off the platform's right corner. -->
  <g fill="#8e8975">
    <circle cx="51" cy="47" r="1.3"/><circle cx="53.5" cy="48.5" r="1"/>
    <circle cx="49.5" cy="49.5" r="0.9"/><circle cx="52" cy="50.5" r="0.7"/>
  </g>
  <!-- Vines climbing the left column and moss on the platform edge. -->
  <path d="M17 38 Q15.8 31 17.2 24 M20.8 38 Q21.8 33 20.9 27" stroke="#4c8a40" stroke-width="1" fill="none" stroke-linecap="round"/>
  <circle cx="16.6" cy="30" r="0.6" fill="#63a651"/>
  <circle cx="21.3" cy="31.5" r="0.55" fill="#63a651"/>
  <ellipse cx="15" cy="44" rx="1.6" ry="0.8" fill="#6a9440" opacity="0.85"/>
  <ellipse cx="44" cy="43" rx="1.4" ry="0.7" fill="#6a9440" opacity="0.85"/>
  <path d="M9 50 Q10 47.5 11 50 M55 42 Q56 39.5 57 42" stroke="#4c8a40" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
