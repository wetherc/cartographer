<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#5a9b4a"/>
  <ellipse cx="52" cy="12" rx="9" ry="5" fill="#63a651"/>
  <ellipse cx="10" cy="30" rx="7" ry="4" fill="#529044"/>
  <ellipse cx="32" cy="42" rx="20" ry="11" fill="#63a651"/>
  <!-- Main tent: canvas wedge with an open flap. -->
  <g>
    <ellipse cx="22" cy="38" rx="10" ry="2.5" fill="#42522f" opacity="0.5"/>
    <polygon points="12,38 22,20 32,38" fill="#b8975a"/>
    <polygon points="22,20 32,38 22,38" fill="#9a7c47"/>
    <polygon points="19,38 22,27 25,38" fill="#4a3a26"/>
    <path d="M22 20 L22 17" stroke="#6f583a" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Smaller tent behind. -->
  <g>
    <ellipse cx="46" cy="30" rx="7" ry="1.8" fill="#42522f" opacity="0.5"/>
    <polygon points="39,30 46,18 53,30" fill="#8f9a6b"/>
    <polygon points="46,18 53,30 46,30" fill="#76814f"/>
    <polygon points="44,30 46,23.5 48,30" fill="#3d3423"/>
  </g>
  <!-- Campfire: stone ring, crossed logs, flame with glow. -->
  <g>
    <circle cx="38" cy="46" r="6.5" fill="#e8a83c" opacity="0.15"/>
    <ellipse cx="38" cy="47.5" rx="5" ry="2.4" fill="#6b655b"/>
    <ellipse cx="38" cy="47" rx="3.6" ry="1.6" fill="#3a362f"/>
    <path d="M34.5 48 L41.5 46.2 M34.8 46 L41.2 48.2" stroke="#5a4028" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M38 40.5 Q35.8 43.5 38 46.5 Q40.2 43.5 38 40.5" fill="#e8a83c"/>
    <path d="M38 42.5 Q37 44 38 45.8 Q39 44 38 42.5" fill="#f5d06a"/>
  </g>
  <!-- Sitting log, bedroll, and a hung kettle pole. -->
  <g>
    <rect x="27" y="52" width="13" height="3.2" rx="1.6" fill="#7a5a38"/>
    <ellipse cx="27" cy="53.6" rx="1.6" ry="1.6" fill="#a3865c"/>
    <circle cx="27" cy="53.6" r="0.7" fill="#8a6f4a"/>
  </g>
  <g>
    <rect x="44" y="42" width="10" height="4" rx="2" fill="#8f4a3a"/>
    <path d="M46 42.5 L46 45.5 M49 42.5 L49 45.5" stroke="#6f382c" stroke-width="0.8"/>
  </g>
  <path d="M14 52 Q15 49.5 16 52 M18 53 Q19 50.5 20 53" stroke="#4c8a40" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
