<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#5a9b4a"/>
  <ellipse cx="13" cy="11" rx="8" ry="4.5" fill="#63a651"/>
  <ellipse cx="53" cy="55" rx="7" ry="4" fill="#529044"/>
  <ellipse cx="32" cy="44" rx="21" ry="11" fill="#c2a36c"/>
  <ellipse cx="32" cy="44" rx="16" ry="8" fill="#cdb078"/>
  <!-- chimney smoke -->
  <g fill="#c9c4ba">
    <circle cx="44" cy="14" r="2" opacity="0.55"/>
    <circle cx="46.5" cy="10.5" r="2.6" opacity="0.4"/>
    <circle cx="49.5" cy="7.5" r="3" opacity="0.25"/>
  </g>
  <!-- two-story timbered building -->
  <rect x="16" y="25" width="30" height="23" fill="#e0c79a" stroke="#b09368" stroke-width="0.8"/>
  <path d="M16 36 H46 M22 25 V36 M40 25 V36 M19 36 V48 M43 36 V48" stroke="#8a6f4a" stroke-width="1.2"/>
  <path d="M22 30.5 L28 25 M40 30.5 L34 25" stroke="#8a6f4a" stroke-width="1"/>
  <!-- slate roof -->
  <polygon points="13,26 31,14 49,26" fill="#4a5d74"/>
  <polygon points="31,14 49,26 31,26" fill="#37485c"/>
  <path d="M17 23.4 L45 23.4 M20.5 21 L41.5 21 M24 18.6 L38 18.6" stroke="#3f5064" stroke-width="0.7" fill="none"/>
  <rect x="42" y="16" width="3.5" height="9" fill="#8a8f94" stroke="#6f747a" stroke-width="0.5"/>
  <!-- lit windows, upper floor -->
  <rect x="20" y="28" width="5" height="5" fill="#e8c05a" stroke="#8a6f4a" stroke-width="0.7"/>
  <rect x="29" y="28" width="5" height="5" fill="#e8c05a" stroke="#8a6f4a" stroke-width="0.7"/>
  <rect x="38" y="28" width="5" height="5" fill="#e8c05a" stroke="#8a6f4a" stroke-width="0.7"/>
  <path d="M22.5 28 V33 M31.5 28 V33 M40.5 28 V33 M20 30.5 H25 M29 30.5 H34 M38 30.5 H43" stroke="#8a6f4a" stroke-width="0.55"/>
  <!-- ground floor: door and window -->
  <rect x="28" y="40" width="6.5" height="8" fill="#5a4530"/>
  <path d="M29 40 Q31.2 38.4 34 40" fill="#5a4530"/>
  <circle cx="33.4" cy="44.4" r="0.6" fill="#c9a020"/>
  <rect x="20" y="40" width="5" height="4.5" fill="#e8c05a" stroke="#8a6f4a" stroke-width="0.7"/>
  <rect x="37.5" y="40" width="5" height="4.5" fill="#e8c05a" stroke="#8a6f4a" stroke-width="0.7"/>
  <!-- hanging sign: crescent moon (rest for the night) -->
  <g>
    <rect x="10.2" y="27" width="1.6" height="21" fill="#6b5236"/>
    <path d="M11 29 L16.5 29 L16.5 31" stroke="#6b5236" stroke-width="1.4" fill="none"/>
    <rect x="13.2" y="31" width="7" height="7" rx="1" fill="#4a5d74" stroke="#37485c" stroke-width="0.7"/>
    <path d="M18.4 32.2 a2.6 2.6 0 1 0 0 4.6 a3.2 3.2 0 0 1 0 -4.6 Z" fill="#e8d27a"/>
  </g>
  <path d="M27 51 Q32 49.8 37 51 M29 54 Q32 53.2 35 54" stroke="#b09a63" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
