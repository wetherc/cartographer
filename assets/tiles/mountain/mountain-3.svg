<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <g id="er">
      <polygon points="-7,4 -2,-4 3,4" fill="#7d848c"/>
      <polygon points="-2,-4 -2,4 3,4" fill="#5b6167"/>
      <polygon points="2,5 6,-2 10,5" fill="#757c84"/>
      <polygon points="6,-2 6,5 10,5" fill="#545a60"/>
    </g>
  </defs>
  <rect width="64" height="64" fill="#9aa0a6"/>
  <g fill="#878e94">
    <circle cx="52" cy="10" r="1.2"/><circle cx="10" cy="20" r="1.1"/>
    <circle cx="56" cy="58" r="1.3"/><circle cx="8" cy="58" r="1"/>
  </g>
  <!-- Mid-ground ridge + edge outcrops: byte-identical across mountain
       variants; the ridge is phase-continuous at x=0/x=64 (same point, same
       tangent) and the outcrops are stamped in wrapped pairs (a stamp
       crossing x=0 repeats at +64, likewise y, corners at all four). Stamp
       centers are staggered a few units off the border line at irregular
       offsets that differ per edge, and some are mirrored, so seams read as
       broken rock rather than a straight row of identical outcrops. -->
  <path d="M0 36 L10 30 L18 35 L26 27 L34 34 L43 29 L54 42 L64 36 L64 50 L0 50 Z" fill="#8a9096"/>
  <g>
    <use href="#er" transform="translate(0 0) scale(0.8)"/>
    <use href="#er" transform="translate(64 0) scale(0.8)"/>
    <use href="#er" transform="translate(0 64) scale(0.8)"/>
    <use href="#er" transform="translate(64 64) scale(0.8)"/>
    <use href="#er" transform="translate(2 20) scale(0.85)"/>
    <use href="#er" transform="translate(66 20) scale(0.85)"/>
    <use href="#er" transform="translate(-3 47) scale(-0.75 0.75)"/>
    <use href="#er" transform="translate(61 47) scale(-0.75 0.75)"/>
    <use href="#er" transform="translate(14 1) scale(0.8)"/>
    <use href="#er" transform="translate(14 65) scale(0.8)"/>
    <use href="#er" transform="translate(38 -2) scale(0.9)"/>
    <use href="#er" transform="translate(38 62) scale(0.9)"/>
    <use href="#er" transform="translate(53 2) scale(-0.7 0.7)"/>
    <use href="#er" transform="translate(53 66) scale(-0.7 0.7)"/>
  </g>
  <polygon points="4,56 14,42 24,56" fill="#7d848c"/>
  <polygon points="14,42 14,56 24,56" fill="#5b6167"/>
  <polygon points="14,56 32,12 50,56" fill="#7d848c"/>
  <polygon points="32,12 32,56 50,56" fill="#5b6167"/>
  <polygon points="32,12 39,26 35.5,23.4 32,27 28.5,23.4 25,26" fill="#eef2f5"/>
  <path d="M32 12 L32 56" stroke="#4e545a" stroke-width="1" opacity="0.4"/>
  <path d="M32 27 L30 34 M32 30 L34.5 38" stroke="#e3e9ee" stroke-width="1.2" fill="none" opacity="0.7"/>
</svg>
