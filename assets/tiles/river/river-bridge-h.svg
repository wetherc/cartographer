<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- North-south channel with one gentle symmetric bow under the deck. -->
  <path d="M32 0 C32 10 30 16 30 32 C30 48 32 54 32 64" stroke="#6b5a3e" stroke-width="22" fill="none"/>
  <path d="M32 0 C32 10 30 16 30 32 C30 48 32 54 32 64" stroke="#33719f" stroke-width="18" fill="none"/>
  <g stroke="#7fb2d9" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M27.5 8 C27 11 26.5 14 26.5 17"/>
    <path d="M36.5 48 C36.5 51 36 54 35.5 57"/>
  </g>
  <g fill="#8ac2e6"><circle cx="34" cy="12" r="0.9"/><circle cx="28" cy="54" r="0.9"/></g>
  <!-- East-west road approaches meeting the deck. -->
  <path d="M0 32 L19 32 M45 32 L64 32" stroke="#7c6448" stroke-width="20" fill="none"/>
  <path d="M0 32 L19 32 M45 32 L64 32" stroke="#bb9c70" stroke-width="16" fill="none"/>
  <g stroke="#9c8158" stroke-width="1.5" fill="none"><path d="M0 27 L19 27 M45 27 L64 27"/><path d="M0 37 L19 37 M45 37 L64 37"/></g>
  <!-- Deck shadow on the water, then the plank deck with rails and posts. -->
  <path d="M18 44 L46 44" stroke="#22516f" stroke-width="2" opacity="0.6"/>
  <rect x="18" y="21.5" width="28" height="21" fill="#8a6f4a"/>
  <path d="M22 21.5 L22 42.5 M26 21.5 L26 42.5 M30 21.5 L30 42.5 M34 21.5 L34 42.5 M38 21.5 L38 42.5 M42 21.5 L42 42.5" stroke="#6f583a" stroke-width="0.7" fill="none"/>
  <rect x="17" y="19.5" width="30" height="2.4" fill="#5f4529"/>
  <rect x="17" y="42.1" width="30" height="2.4" fill="#5f4529"/>
  <g fill="#4a3a26">
    <rect x="16.5" y="18.8" width="2.4" height="3.6"/><rect x="45.1" y="18.8" width="2.4" height="3.6"/>
    <rect x="16.5" y="41.6" width="2.4" height="3.6"/><rect x="45.1" y="41.6" width="2.4" height="3.6"/>
