  <g stroke="#7fb2d9" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M10 29 C14 26 20 24.5 27 25.5"/>
    <path d="M37 39.5 C44 40 51 38 56 34.5"/>
  </g>
