  <rect x="21.5" y="18" width="21" height="28" fill="#8a6f4a"/>
  <path d="M21.5 22 L42.5 22 M21.5 26 L42.5 26 M21.5 30 L42.5 30 M21.5 34 L42.5 34 M21.5 38 L42.5 38 M21.5 42 L42.5 42" stroke="#6f583a" stroke-width="0.7" fill="none"/>
  <rect x="19.5" y="17" width="2.4" height="30" fill="#5f4529"/>
  <rect x="42.1" y="17" width="2.4" height="30" fill="#5f4529"/>
  <g fill="#4a3a26">
    <rect x="18.8" y="16.5" width="3.6" height="2.4"/><rect x="18.8" y="45.1" width="3.6" height="2.4"/>
    <rect x="41.6" y="16.5" width="3.6" height="2.4"/><rect x="41.6" y="45.1" width="3.6" height="2.4"/>
  </g>
