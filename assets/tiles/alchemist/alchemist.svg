<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#5a9b4a"/>
  <ellipse cx="51" cy="12" rx="8" ry="4.5" fill="#63a651"/>
  <ellipse cx="12" cy="55" rx="7" ry="4" fill="#529044"/>
  <ellipse cx="32" cy="44" rx="21" ry="11" fill="#c2a36c"/>
  <ellipse cx="32" cy="44" rx="16" ry="8" fill="#cdb078"/>
  <!-- green fumes from the crooked chimney -->
  <g fill="#7ec46a">
    <circle cx="41" cy="13" r="2" opacity="0.55"/>
    <circle cx="43.5" cy="9.5" r="2.6" opacity="0.4"/>
    <circle cx="46.5" cy="6.5" r="3" opacity="0.25"/>
  </g>
  <!-- crooked narrow house -->
  <path d="M21 47 L22 28 L41 27 L42 47 Z" fill="#cbb691" stroke="#a08a5f" stroke-width="0.8"/>
  <path d="M21.7 34.5 L41.4 33.6 M23 28 L22.6 47 M40.2 27.4 L40.6 47" stroke="#8a6f4a" stroke-width="1.1"/>
  <!-- lopsided purple roof -->
  <path d="M18 29 L30 15.5 L45 26.5 L41 28 L22 29.5 Z" fill="#6b4a8c"/>
  <path d="M30 15.5 L45 26.5 L41 28 L31 28.4 Z" fill="#523a6d"/>
  <path d="M21.5 26.5 L40 25.2 M25 23 L36 21.5" stroke="#5d4179" stroke-width="0.8" fill="none"/>
  <rect x="38" y="14" width="3.5" height="7" fill="#8a8f94" stroke="#6f747a" stroke-width="0.5" transform="rotate(8 39.7 17.5)"/>
  <!-- round window, glowing green -->
  <circle cx="31.5" cy="31" r="2.6" fill="#9fe08a" stroke="#8a6f4a" stroke-width="0.8"/>
  <path d="M29 31 H34 M31.5 28.5 V33.5" stroke="#8a6f4a" stroke-width="0.55"/>
  <!-- door and small window -->
  <rect x="28.5" y="39.5" width="6" height="7.5" fill="#5a4530"/>
  <path d="M29.5 39.5 Q31.5 38 34.5 39.5" fill="#5a4530"/>
  <circle cx="33.4" cy="43.6" r="0.6" fill="#c9a020"/>
  <rect x="24" y="37" width="3.6" height="3.6" fill="#e8c05a" stroke="#8a6f4a" stroke-width="0.6"/>
  <!-- hanging sign: potion bottle -->
  <g>
    <rect x="46.6" y="27" width="1.6" height="20" fill="#6b5236"/>
    <path d="M47.4 29 L53 29 L53 31" stroke="#6b5236" stroke-width="1.4" fill="none"/>
    <rect x="49.6" y="31" width="7" height="7.5" rx="1" fill="#5d4a3a" stroke="#463829" stroke-width="0.7"/>
    <path d="M52.6 32 h1 v1.4 q1.6 0.8 1.6 2.5 a2.1 2.1 0 0 1 -4.2 0 q0 -1.7 1.6 -2.5 Z" fill="#5fae4e"/>
    <path d="M51.2 35.6 a1.9 1.9 0 0 0 3.8 0 q-0.1 -0.9 -1 -1.5 q-1.4 0.9 -2.6 0.6 Z" fill="#8fd97e"/>
  </g>
  <!-- cauldron out front -->
  <g>
    <path d="M11 42.5 q0 4 4 4.5 q4 -0.5 4 -4.5 Z" fill="#3f4147"/>
    <ellipse cx="15" cy="42.5" rx="4" ry="1.3" fill="#2c2e33"/>
    <ellipse cx="15" cy="42.2" rx="2.8" ry="0.8" fill="#6fbf5c"/>
    <circle cx="13.8" cy="40.7" r="0.7" fill="#8fd97e" opacity="0.8"/>
    <circle cx="16.4" cy="39.8" r="0.5" fill="#8fd97e" opacity="0.6"/>
  </g>
</svg>
