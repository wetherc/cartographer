  <!-- Edge canopy: byte-identical across forest variants, stamped in wrapped
       pairs (x=0 repeats at x=64, y=0 at y=64) so any variant abuts any
       variant seamlessly. -->
  <g>
    <use href="#ec" transform="translate(0 0)"/>
    <use href="#ec" transform="translate(64 0)"/>
    <use href="#ec" transform="translate(0 64)"/>
    <use href="#ec" transform="translate(64 64)"/>
    <use href="#ec" transform="translate(0 24) scale(0.9)"/>
    <use href="#ec" transform="translate(64 24) scale(0.9)"/>
    <use href="#ec" transform="translate(0 45) scale(0.85)"/>
    <use href="#ec" transform="translate(64 45) scale(0.85)"/>
    <use href="#ec" transform="translate(22 0) scale(0.9)"/>
    <use href="#ec" transform="translate(22 64) scale(0.9)"/>
    <use href="#ec" transform="translate(43 0) scale(0.85)"/>
    <use href="#ec" transform="translate(43 64) scale(0.85)"/>
  </g>
  <use href="#tr" transform="translate(25 23) scale(1.15)"/>
  <use href="#tr" transform="translate(45 37) scale(1.2)"/>
  <use href="#tr" transform="translate(24 46) scale(0.95)"/>
