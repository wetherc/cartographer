  <g fill="#cfe3f5" opacity="0.85">
    <circle cx="29" cy="31" r="0.6"/><circle cx="35" cy="29.5" r="0.5"/>
    <circle cx="32.5" cy="33" r="0.4"/><circle cx="37" cy="32.5" r="0.45"/>
